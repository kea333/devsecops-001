# ============================================================
# Weather App – CI/CD Pipeline
# Triggers: push to main, any pull request to main
# Jobs:
#   1. test     – run pytest suite
#   2. security – bandit (code scan) + pip-audit (dependency scan)
#   3. build    – build Docker image (only if 1 and 2 pass)
# ============================================================

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # JOB 1: Run Pytest Suite
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest --cov=app --cov-report=term-missing -v

  # ──────────────────────────────────────────
  # JOB 2: Security Scan
  # Runs after tests pass
  # Blocks Docker build if issues found
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      # ── Bandit: Python code security scan ──
      # -r         recursive scan
      # -ll        fail on MEDIUM severity and above
      # -v         verbose output
      # --exclude  skip tests/ (test files intentionally use insecure patterns)
      - name: Run Bandit — code security scan
        run: bandit -r app.py -ll -v

      # ── pip-audit: dependency vulnerability scan ──
      # Checks requirements.txt against CVE databases
      - name: Run pip-audit — dependency vulnerability scan
        run: pip-audit -r requirements.txt

  # ──────────────────────────────────────────
  # JOB 3: Build Docker Image
  # Only runs if BOTH test and security pass
  # ──────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: false
          tags: weather-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Confirm build succeeded
        run: echo "Docker image built successfully"