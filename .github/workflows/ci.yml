# ============================================================
# Weather App – CI/CD Pipeline
# Jobs:
#   1. test     – pytest suite
#   2. security – bandit + pip-audit
#   3. build    – build Docker image, export as artifact
#   4. trivy    – container vulnerability scan
#   5. push     – push approved image to AWS ECR (main only)
#   6. deploy   – deploy to EKS (main only)
# ============================================================

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # JOB 1: Run Pytest Suite
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest --cov=app --cov-report=term-missing -v

  # ──────────────────────────────────────────
  # JOB 2: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit — code security scan
        run: bandit -r app.py -ll -v

      - name: Run pip-audit — dependency vulnerability scan
        run: pip-audit -r requirements.txt

  # ──────────────────────────────────────────
  # JOB 3: Build Docker Image
  # ──────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      - name: Build Docker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: false
          load: true
          tags: weather-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker image as tar
        run: docker save weather-app:latest | gzip > weather-app.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-app-image
          path: weather-app.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 4: Trivy Container Scan
  # ──────────────────────────────────────────
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: weather-app-image

      - name: Load Docker image
        run: docker load < weather-app.tar.gz

      - name: Run Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: weather-app:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  # ──────────────────────────────────────────
  # JOB 5: Push to AWS ECR
  # Main branch only — OIDC auth, no stored keys
  # ──────────────────────────────────────────
  push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main'
    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: weather-app-image

      - name: Load Docker image
        run: docker load < weather-app.tar.gz

      # Tag with both commit SHA (immutable) and latest
      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag weather-app:latest $ECR_REGISTRY/weather-app:$IMAGE_TAG
          docker tag weather-app:latest $ECR_REGISTRY/weather-app:latest
          docker push $ECR_REGISTRY/weather-app:$IMAGE_TAG
          docker push $ECR_REGISTRY/weather-app:latest
          echo "IMAGE=$ECR_REGISTRY/weather-app:$IMAGE_TAG" >> $GITHUB_ENV

  # ──────────────────────────────────────────
  # JOB 6: Deploy to EKS
  # Main branch only — requires EKS cluster
  # Cluster provisioned in Part 7 (Terraform)
  # ──────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main' && vars.EKS_ENABLED == 'true'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      # Replace IMAGE_PLACEHOLDER with real ECR image URI
      - name: Inject image into deployment manifest
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|IMAGE_PLACEHOLDER|$ECR_REGISTRY/weather-app:$IMAGE_TAG|g" \
            kubernetes/deployment.yaml

      - name: Apply Kubernetes manifests
        run: kubectl apply -f kubernetes/

      - name: Wait for rollout
        run: kubectl rollout status deployment/weather-app --timeout=120s

      - name: Confirm deployment
        run: kubectl get pods -l app=weather-app