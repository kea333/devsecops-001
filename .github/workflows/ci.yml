# ============================================================
# Weather App – CI/CD Pipeline
# Triggers: push to main, any pull request to main
# Jobs:
#   1. test     – pytest suite
#   2. security – bandit (code scan) + pip-audit (dependency scan)
#   3. build    – build Docker image, export as artifact
#   4. trivy    – container vulnerability scan (only if build passes)
# ============================================================

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ──────────────────────────────────────────
  # JOB 1: Run Pytest Suite
  # ──────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest --cov=app --cov-report=term-missing -v

  # ──────────────────────────────────────────
  # JOB 2: Security Scan
  # ──────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit pip-audit

      - name: Run Bandit — code security scan
        run: bandit -r app.py -ll -v

      - name: Run pip-audit — dependency vulnerability scan
        run: pip-audit -r requirements.txt

  # ──────────────────────────────────────────
  # JOB 3: Build Docker Image
  # Saves image as tar artifact for Trivy
  # ──────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.10.0

      # load: true puts image into local Docker daemon
      - name: Build Docker image
        uses: docker/build-push-action@v6.16.0
        with:
          context: .
          push: false
          load: true
          tags: weather-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Export image so Trivy job can load it
      - name: Save Docker image as tar
        run: docker save weather-app:latest | gzip > weather-app.tar.gz

      # Upload tar for Trivy job — retained for 1 day only
      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: weather-app-image
          path: weather-app.tar.gz
          retention-days: 1

  # ──────────────────────────────────────────
  # JOB 4: Trivy Container Scan
  # Blocks pipeline on CRITICAL or HIGH CVEs
  # Only runs if build passes
  # ──────────────────────────────────────────
  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: weather-app-image

      - name: Load Docker image
        run: docker load < weather-app.tar.gz

      - name: Run Trivy — container vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0        # changed from v0.30.0 which had serious security flaw
        with:
          image-ref: weather-app:latest
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'